version: '3.8'

services:
  fermtrack-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-fallback-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-fallback-jwt-secret}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///fermtrack.db}
    volumes:
      - fermtrack_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Uncomment to add PostgreSQL database
  # fermtrack-db:
  #   image: postgres:15-alpine
  #   environment:
  #     - POSTGRES_DB=fermtrack
  #     - POSTGRES_USER=fermtrack
  #     - POSTGRES_PASSWORD=${DB_PASSWORD:-fermtrack_password}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   ports:
  #     - "5432:5432"

volumes:
  fermtrack_data:
