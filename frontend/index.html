<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FermTrack App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #121212;
      color: #f5f5f5;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      width: min(1200px, 95%);
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid #2c2c2c;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #d6b25e;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 0.95rem;
    }

    .btn-primary {
      background: #d6b25e;
      color: #121212;
    }

    .btn-primary:hover {
      background: #e3c16f;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid #444;
      color: #f5f5f5;
    }

    .btn-secondary:hover {
      border-color: #777;
      background: #1a1a1a;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .btn-small {
      padding: 8px 12px;
      font-size: 0.85rem;
    }

    .card {
      background: #181818;
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card h2, .card h3 {
      margin-bottom: 16px;
      color: #f5f5f5;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #d0d0d0;
    }

    .form-control {
      width: 100%;
      padding: 12px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #1a1a1a;
      color: #f5f5f5;
      font-size: 0.95rem;
    }

    .form-control:focus {
      outline: none;
      border-color: #d6b25e;
      box-shadow: 0 0 0 2px rgba(214, 178, 94, 0.2);
    }

    select.form-control {
      cursor: pointer;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-card {
      background: #181818;
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .auth-toggle {
      text-align: center;
      margin-top: 20px;
      color: #bbb;
    }

    .auth-toggle a {
      color: #d6b25e;
      text-decoration: none;
    }

    .auth-toggle a:hover {
      text-decoration: underline;
    }

    .batch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .batch-card {
      background: #181818;
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      padding: 20px;
      position: relative;
    }

    .batch-status {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
    }

    .status-mixing { background: #fbbf24; color: #000; }
    .status-bulk_ferment { background: #3b82f6; color: #fff; }
    .status-divided { background: #8b5cf6; color: #fff; }
    .status-proofing { background: #f59e0b; color: #000; }
    .status-ready { background: #10b981; color: #fff; }
    .status-baked { background: #6b7280; color: #fff; }
    .status-discarded { background: #ef4444; color: #fff; }

    .batch-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
    }

    .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #181818;
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      padding: 30px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #2d2d2d;
    }

    .modal-close {
      background: none;
      border: none;
      color: #999;
      font-size: 24px;
      cursor: pointer;
    }

    .modal-close:hover {
      color: #fff;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #2d2d2d;
      margin-bottom: 20px;
    }

    .tab {
      padding: 12px 20px;
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .tab.active {
      color: #d6b25e;
      border-bottom-color: #d6b25e;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .actions-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .action-item {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .action-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .action-type {
      background: #d6b25e;
      color: #121212;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
    }

    .action-time {
      color: #999;
      font-size: 0.85rem;
    }

    .stage-item {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .stage-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .stage-name {
      color: #d6b25e;
      font-weight: 500;
      text-transform: capitalize;
    }

    .stage-active {
      background: #10b981;
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
    }

    .stage-complete {
      background: #6b7280;
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #fca5a5;
    }

    .alert-success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid #10b981;
      color: #6ee7b7;
    }

    .hidden {
      display: none !important;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .navbar-actions {
      display: flex;
      gap: 10px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 10px;
      }

      .header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
      }

      .navbar-actions {
        flex-direction: column;
        width: 100%;
      }

      .batch-grid {
        grid-template-columns: 1fr;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .batch-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <!-- Authentication Screen -->
  <div id="authScreen" class="auth-container">
    <div class="auth-card">
      <h2 style="text-align: center; margin-bottom: 30px; color: #d6b25e;">FermTrack</h2>
      
      <div id="loginForm">
        <h3 style="margin-bottom: 20px;">Login</h3>
        <div class="form-group">
          <label for="loginUsername">Username</label>
          <input type="text" id="loginUsername" class="form-control" placeholder="Enter username">
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" class="form-control" placeholder="Enter password">
        </div>
        <button onclick="login()" class="btn btn-primary" style="width: 100%; margin-bottom: 15px;">Login</button>
        <div class="auth-toggle">
          Don't have an account? <a href="#" onclick="showRegister()">Register here</a>
        </div>
      </div>

      <div id="registerForm" class="hidden">
        <h3 style="margin-bottom: 20px;">Register</h3>
        <div class="form-group">
          <label for="regUsername">Username</label>
          <input type="text" id="regUsername" class="form-control" placeholder="Choose username">
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" class="form-control" placeholder="Enter email">
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" class="form-control" placeholder="Choose password">
        </div>
        <div class="form-group">
          <label for="regRole">Role</label>
          <select id="regRole" class="form-control">
            <option value="baker">Baker</option>
            <option value="manager">Manager</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button onclick="register()" class="btn btn-primary" style="width: 100%; margin-bottom: 15px;">Register</button>
        <div class="auth-toggle">
          Already have an account? <a href="#" onclick="showLogin()">Login here</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Application -->
  <div id="appScreen" class="hidden">
    <div class="container">
      <div class="header">
        <div class="logo">FermTrack</div>
        <div class="user-info">
          <span id="userDisplay"></span>
          <div class="navbar-actions">
            <button onclick="showCreateBatch()" class="btn btn-primary btn-small">New Batch</button>
            <button onclick="logout()" class="btn btn-secondary btn-small">Logout</button>
          </div>
        </div>
      </div>

      <div id="batchesContainer">
        <h2>Active Batches</h2>
        <div id="batchesGrid" class="batch-grid">
          <!-- Batches will be loaded here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Create/Edit Batch Modal -->
  <div id="batchModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="batchModalTitle">Create New Batch</h3>
        <button type="button" class="modal-close" onclick="closeBatchModal()">&times;</button>
      </div>
      <form onsubmit="saveBatch(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="batchId">Batch ID</label>
            <input type="text" id="batchId" class="form-control" required placeholder="e.g., LB001">
          </div>
          <div class="form-group">
            <label for="recipeName">Recipe Name</label>
            <input type="text" id="recipeName" class="form-control" required placeholder="e.g., Laugenbrezeln">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="doughWeight">Dough Weight (g)</label>
            <input type="number" id="doughWeight" class="form-control" required min="1" step="0.1" placeholder="2500">
          </div>
          <div class="form-group">
            <label for="batchStatus">Status</label>
            <select id="batchStatus" class="form-control">
              <option value="mixing">Mixing</option>
              <option value="bulk_ferment">Bulk Ferment</option>
              <option value="divided">Divided</option>
              <option value="proofing">Proofing</option>
              <option value="ready">Ready</option>
              <option value="baked">Baked</option>
              <option value="discarded">Discarded</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="temperature">Temperature (°C)</label>
            <input type="number" id="temperature" class="form-control" step="0.1" placeholder="22.5">
          </div>
          <div class="form-group">
            <label for="humidity">Humidity (%)</label>
            <input type="number" id="humidity" class="form-control" min="0" max="100" step="0.1" placeholder="65">
          </div>
        </div>
        <div class="form-group">
          <label for="batchNotes">Notes</label>
          <textarea id="batchNotes" class="form-control" rows="3" placeholder="Optional notes about this batch..."></textarea>
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
          <button type="button" onclick="closeBatchModal()" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Batch</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Batch Details Modal -->
  <div id="batchDetailsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="batchDetailsTitle">Batch Details</h3>
        <button type="button" class="modal-close" onclick="closeBatchDetails()">&times;</button>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="showTab('overview')">Overview</button>
        <button class="tab" onclick="showTab('actions')">Actions</button>
        <button class="tab" onclick="showTab('stages')">Fermentation</button>
      </div>

      <div id="overviewTab" class="tab-content active">
        <div id="batchOverview">
          <!-- Batch overview content -->
        </div>
      </div>

      <div id="actionsTab" class="tab-content">
        <div style="margin-bottom: 20px;">
          <h4>Add New Action</h4>
          <form onsubmit="addBatchAction(event)">
            <div class="form-row">
              <div class="form-group">
                <label for="actionType">Action Type</label>
                <select id="actionType" class="form-control" required>
                  <option value="fortify">Fortify</option>
                  <option value="re-ball">Re-ball</option>
                  <option value="degas">Degas</option>
                  <option value="wash">Wash</option>
                  <option value="divide">Divide</option>
                  <option value="shape">Shape</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div class="form-group">
                <label for="weightChange">Weight Change (g)</label>
                <input type="number" id="weightChange" class="form-control" step="0.1" placeholder="0">
              </div>
            </div>
            <div class="form-group">
              <label for="actionDescription">Description</label>
              <input type="text" id="actionDescription" class="form-control" placeholder="Describe the action...">
            </div>
            <button type="submit" class="btn btn-primary btn-small">Add Action</button>
          </form>
        </div>
        <div class="actions-list" id="actionsList">
          <!-- Actions will be loaded here -->
        </div>
      </div>

      <div id="stagesTab" class="tab-content">
        <div style="margin-bottom: 20px;">
          <h4>Start New Stage</h4>
          <form onsubmit="addFermentationStage(event)">
            <div class="form-row">
              <div class="form-group">
                <label for="stageName">Stage Type</label>
                <select id="stageName" class="form-control" required>
                  <option value="autolyse">Autolyse</option>
                  <option value="bulk_ferment">Bulk Ferment</option>
                  <option value="proof">Proof</option>
                  <option value="final_proof">Final Proof</option>
                  <option value="retard">Retard</option>
                </select>
              </div>
              <div class="form-group">
                <label for="targetDuration">Target Duration (hours)</label>
                <input type="number" id="targetDuration" class="form-control" step="0.1" min="0" placeholder="4.0">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="tempTarget">Target Temp (°C)</label>
                <input type="number" id="tempTarget" class="form-control" step="0.1" placeholder="24.0">
              </div>
              <div class="form-group">
                <label for="humidityTarget">Target Humidity (%)</label>
                <input type="number" id="humidityTarget" class="form-control" step="0.1" min="0" max="100" placeholder="70">
              </div>
            </div>
            <div class="form-group">
              <label for="stageNotes">Notes</label>
              <input type="text" id="stageNotes" class="form-control" placeholder="Stage notes...">
            </div>
            <button type="submit" class="btn btn-primary btn-small">Start Stage</button>
          </form>
        </div>
        <div id="stagesList">
          <!-- Fermentation stages will be loaded here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Alerts Container -->
  <div id="alertsContainer" style="position: fixed; top: 20px; right: 20px; z-index: 2000; max-width: 400px;"></div>

  <script>
    // Global state
    let currentUser = null;
    let authToken = localStorage.getItem('fermtrack_token');
    let batches = [];
    let currentBatchId = null;

    // API Configuration
    const API_BASE = 'http://localhost:5000/api';

    // Initialize app
    document.addEventListener('DOMContentLoaded', () => {
      if (authToken) {
        validateToken();
      } else {
        showAuth();
      }
    });

    // Auth functions
    function showAuth() {
      document.getElementById('authScreen').classList.remove('hidden');
      document.getElementById('appScreen').classList.add('hidden');
    }

    function showApp() {
      document.getElementById('authScreen').classList.add('hidden');
      document.getElementById('appScreen').classList.remove('hidden');
      loadBatches();
    }

    function showLogin() {
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('registerForm').classList.add('hidden');
    }

    function showRegister() {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.remove('hidden');
    }

    async function validateToken() {
      try {
        const response = await fetch(`${API_BASE}/auth/me`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        
        if (response.ok) {
          const data = await response.json();
          currentUser = data.user;
          document.getElementById('userDisplay').textContent = `${currentUser.username} (${currentUser.role})`;
          showApp();
        } else {
          localStorage.removeItem('fermtrack_token');
          authToken = null;
          showAuth();
        }
      } catch (error) {
        console.error('Token validation failed:', error);
        showAuth();
      }
    }

    async function login() {
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;

      if (!username || !password) {
        showAlert('Please enter username and password', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          authToken = data.access_token;
          localStorage.setItem('fermtrack_token', authToken);
          currentUser = data.user;
          document.getElementById('userDisplay').textContent = `${currentUser.username} (${currentUser.role})`;
          showAlert('Login successful!', 'success');
          showApp();
        } else {
          showAlert(data.error || 'Login failed', 'error');
        }
      } catch (error) {
        console.error('Login error:', error);
        showAlert('Connection error. Please check if the backend server is running.', 'error');
      }
    }

    async function register() {
      const username = document.getElementById('regUsername').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const role = document.getElementById('regRole').value;

      if (!username || !email || !password) {
        showAlert('Please fill in all fields', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, role })
        });

        const data = await response.json();

        if (response.ok) {
          authToken = data.access_token;
          localStorage.setItem('fermtrack_token', authToken);
          currentUser = data.user;
          document.getElementById('userDisplay').textContent = `${currentUser.username} (${currentUser.role})`;
          showAlert('Registration successful!', 'success');
          showApp();
        } else {
          showAlert(data.error || 'Registration failed', 'error');
        }
      } catch (error) {
        console.error('Registration error:', error);
        showAlert('Connection error. Please check if the backend server is running.', 'error');
      }
    }

    function logout() {
      localStorage.removeItem('fermtrack_token');
      authToken = null;
      currentUser = null;
      document.getElementById('loginUsername').value = '';
      document.getElementById('loginPassword').value = '';
      showAuth();
      showAlert('Logged out successfully', 'success');
    }

    // Batch management functions
    async function loadBatches() {
      try {
        const response = await fetch(`${API_BASE}/batches`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.ok) {
          const data = await response.json();
          batches = data.batches;
          renderBatches();
        } else {
          showAlert('Failed to load batches', 'error');
        }
      } catch (error) {
        console.error('Error loading batches:', error);
        showAlert('Error loading batches', 'error');
      }
    }

    function renderBatches() {
      const container = document.getElementById('batchesGrid');
      
      if (batches.length === 0) {
        container.innerHTML = '<div class="loading">No batches yet. Create your first batch!</div>';
        return;
      }

      container.innerHTML = batches.map(batch => `
        <div class="batch-card">
          <div class="batch-status status-${batch.status}">${batch.status.replace('_', ' ')}</div>
          <h3>${batch.batch_id}</h3>
          <p><strong>${batch.recipe_name}</strong></p>
          <p>Weight: ${batch.dough_weight}g</p>
          ${batch.temperature ? `<p>Temp: ${batch.temperature}°C</p>` : ''}
          ${batch.humidity ? `<p>Humidity: ${batch.humidity}%</p>` : ''}
          ${batch.notes ? `<p style="color: #bbb; font-size: 0.9rem;">${batch.notes}</p>` : ''}
          <p style="color: #999; font-size: 0.85rem; margin-top: 10px;">
            Created: ${new Date(batch.created_at).toLocaleString()}
          </p>
          <div class="batch-actions">
            <button onclick="viewBatch('${batch.batch_id}')" class="btn btn-secondary btn-small">View Details</button>
            <button onclick="editBatch('${batch.batch_id}')" class="btn btn-secondary btn-small">Edit</button>
            ${currentUser?.role === 'admin' || currentUser?.role === 'manager' ? 
              `<button onclick="deleteBatch('${batch.batch_id}')" class="btn btn-danger btn-small">Delete</button>` : ''}
          </div>
        </div>
      `).join('');
    }

    function showCreateBatch() {
      document.getElementById('batchModalTitle').textContent = 'Create New Batch';
      document.getElementById('batchId').disabled = false;
      clearBatchForm();
      document.getElementById('batchModal').style.display = 'block';
    }

    function editBatch(batchId) {
      const batch = batches.find(b => b.batch_id === batchId);
      if (!batch) return;

      document.getElementById('batchModalTitle').textContent = 'Edit Batch';
      document.getElementById('batchId').disabled = true;
      
      // Fill form with batch data
      document.getElementById('batchId').value = batch.batch_id;
      document.getElementById('recipeName').value = batch.recipe_name;
      document.getElementById('doughWeight').value = batch.dough_weight;
      document.getElementById('batchStatus').value = batch.status;
      document.getElementById('temperature').value = batch.temperature || '';
      document.getElementById('humidity').value = batch.humidity || '';
      document.getElementById('batchNotes').value = batch.notes || '';
      
      document.getElementById('batchModal').style.display = 'block';
    }

    function clearBatchForm() {
      document.getElementById('batchId').value = '';
      document.getElementById('recipeName').value = '';
      document.getElementById('doughWeight').value = '';
      document.getElementById('batchStatus').value = 'mixing';
      document.getElementById('temperature').value = '';
      document.getElementById('humidity').value = '';
      document.getElementById('batchNotes').value = '';
    }

    function closeBatchModal() {
      document.getElementById('batchModal').style.display = 'none';
    }

    async function saveBatch(event) {
      event.preventDefault();

      const isEdit = document.getElementById('batchId').disabled;
      const batchId = document.getElementById('batchId').value;
      
      const batchData = {
        recipe_name: document.getElementById('recipeName').value,
        dough_weight: parseFloat(document.getElementById('doughWeight').value),
        status: document.getElementById('batchStatus').value,
        temperature: document.getElementById('temperature').value ? parseFloat(document.getElementById('temperature').value) : null,
        humidity: document.getElementById('humidity').value ? parseFloat(document.getElementById('humidity').value) : null,
        notes: document.getElementById('batchNotes').value || null
      };

      // Only include batch_id for POST requests (create), not PUT requests (edit)
      if (!isEdit) {
        batchData.batch_id = batchId;
      }

      const url = isEdit ? `${API_BASE}/batches/${batchId}` : `${API_BASE}/batches`;
      const method = isEdit ? 'PUT' : 'POST';

      try {
        const response = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify(batchData)
        });

        const data = await response.json();

        if (response.ok) {
          showAlert(`Batch ${isEdit ? 'updated' : 'created'} successfully!`, 'success');
          closeBatchModal();
          loadBatches();
        } else {
          showAlert(data.error || `Failed to ${isEdit ? 'update' : 'create'} batch`, 'error');
        }
      } catch (error) {
        console.error('Error saving batch:', error);
        showAlert('Error saving batch', 'error');
      }
    }

    async function deleteBatch(batchId) {
      if (!confirm(`Are you sure you want to delete batch ${batchId}?`)) return;

      try {
        const response = await fetch(`${API_BASE}/batches/${batchId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.ok) {
          showAlert('Batch deleted successfully', 'success');
          loadBatches();
        } else {
          showAlert('Failed to delete batch', 'error');
        }
      } catch (error) {
        console.error('Error deleting batch:', error);
        showAlert('Error deleting batch', 'error');
      }
    }

    // Batch details functions
    async function viewBatch(batchId) {
      currentBatchId = batchId;
      const batch = batches.find(b => b.batch_id === batchId);
      if (!batch) return;

      document.getElementById('batchDetailsTitle').textContent = `Batch ${batch.batch_id}`;
      
      // Load detailed batch data
      await loadBatchDetails(batchId);
      
      document.getElementById('batchDetailsModal').style.display = 'block';
      showTab('overview');
    }

    async function loadBatchDetails(batchId) {
      try {
        const response = await fetch(`${API_BASE}/batches/${batchId}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.ok) {
          const data = await response.json();
          const batch = data.batch;
          renderBatchOverview(batch);
          renderBatchActions(batch.actions || []);
          renderBatchStages(batch.fermentation_stages || []);
        }
      } catch (error) {
        console.error('Error loading batch details:', error);
        showAlert('Error loading batch details', 'error');
      }
    }

    function renderBatchOverview(batch) {
      const container = document.getElementById('batchOverview');
      container.innerHTML = `
        <div class="card">
          <h4>${batch.recipe_name}</h4>
          <div class="form-row">
            <div><strong>Batch ID:</strong> ${batch.batch_id}</div>
            <div><strong>Status:</strong> <span class="batch-status status-${batch.status}">${batch.status.replace('_', ' ')}</span></div>
          </div>
          <div class="form-row">
            <div><strong>Weight:</strong> ${batch.dough_weight}g</div>
            <div><strong>Temperature:</strong> ${batch.temperature ? batch.temperature + '°C' : 'Not recorded'}</div>
          </div>
          <div class="form-row">
            <div><strong>Humidity:</strong> ${batch.humidity ? batch.humidity + '%' : 'Not recorded'}</div>
            <div><strong>Created:</strong> ${new Date(batch.created_at).toLocaleString()}</div>
          </div>
          ${batch.notes ? `<div style="margin-top: 15px;"><strong>Notes:</strong> ${batch.notes}</div>` : ''}
        </div>
      `;
    }

    function renderBatchActions(actions) {
      const container = document.getElementById('actionsList');
      if (actions.length === 0) {
        container.innerHTML = '<div class="loading">No actions recorded yet.</div>';
        return;
      }

      container.innerHTML = actions.map(action => `
        <div class="action-item">
          <div class="action-header">
            <span class="action-type">${action.action_type}</span>
            <span class="action-time">${new Date(action.timestamp).toLocaleString()}</span>
          </div>
          ${action.description ? `<div style="margin-bottom: 8px;">${action.description}</div>` : ''}
          <div style="display: flex; gap: 20px; font-size: 0.85rem; color: #bbb;">
            ${action.weight_change ? `<span>Weight: ${action.weight_change > 0 ? '+' : ''}${action.weight_change}g</span>` : ''}
            ${action.temperature_recorded ? `<span>Temp: ${action.temperature_recorded}°C</span>` : ''}
            ${action.humidity_recorded ? `<span>Humidity: ${action.humidity_recorded}%</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderBatchStages(stages) {
      const container = document.getElementById('stagesList');
      if (stages.length === 0) {
        container.innerHTML = '<div class="loading">No fermentation stages yet.</div>';
        return;
      }

      container.innerHTML = stages.map(stage => `
        <div class="stage-item">
          <div class="stage-header">
            <span class="stage-name">${stage.stage_name.replace('_', ' ')}</span>
            ${stage.is_active ? 
              `<span class="stage-active">Active</span>
               <button onclick="completeStage('${stage.id}')" class="btn btn-primary btn-small">Complete</button>` :
              `<span class="stage-complete">Complete</span>`
            }
          </div>
          <div style="display: flex; gap: 20px; font-size: 0.85rem; color: #bbb; margin-bottom: 8px;">
            <span>Started: ${new Date(stage.start_time).toLocaleString()}</span>
            ${stage.end_time ? `<span>Ended: ${new Date(stage.end_time).toLocaleString()}</span>` : ''}
          </div>
          <div style="display: flex; gap: 20px; font-size: 0.85rem; color: #bbb;">
            ${stage.target_duration_hours ? `<span>Target: ${stage.target_duration_hours}h</span>` : ''}
            ${stage.temperature_target ? `<span>Target Temp: ${stage.temperature_target}°C</span>` : ''}
            ${stage.humidity_target ? `<span>Target Humidity: ${stage.humidity_target}%</span>` : ''}
          </div>
          ${stage.notes ? `<div style="margin-top: 8px; font-style: italic;">${stage.notes}</div>` : ''}
        </div>
      `).join('');
    }

    async function addBatchAction(event) {
      event.preventDefault();

      const actionData = {
        action_type: document.getElementById('actionType').value,
        description: document.getElementById('actionDescription').value || null,
        weight_change: document.getElementById('weightChange').value ? parseFloat(document.getElementById('weightChange').value) : null
      };

      try {
        const response = await fetch(`${API_BASE}/batches/${currentBatchId}/actions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify(actionData)
        });

        if (response.ok) {
          showAlert('Action added successfully!', 'success');
          // Clear form
          document.getElementById('actionType').value = 'fortify';
          document.getElementById('actionDescription').value = '';
          document.getElementById('weightChange').value = '';
          // Reload batch details
          loadBatchDetails(currentBatchId);
          loadBatches(); // Refresh main list
        } else {
          const data = await response.json();
          showAlert(data.error || 'Failed to add action', 'error');
        }
      } catch (error) {
        console.error('Error adding action:', error);
        showAlert('Error adding action', 'error');
      }
    }

    async function addFermentationStage(event) {
      event.preventDefault();

      const stageData = {
        stage_name: document.getElementById('stageName').value,
        target_duration_hours: document.getElementById('targetDuration').value ? parseFloat(document.getElementById('targetDuration').value) : null,
        temperature_target: document.getElementById('tempTarget').value ? parseFloat(document.getElementById('tempTarget').value) : null,
        humidity_target: document.getElementById('humidityTarget').value ? parseFloat(document.getElementById('humidityTarget').value) : null,
        notes: document.getElementById('stageNotes').value || null
      };

      try {
        const response = await fetch(`${API_BASE}/batches/${currentBatchId}/fermentation-stages`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify(stageData)
        });

        if (response.ok) {
          showAlert('Fermentation stage started!', 'success');
          // Clear form
          document.getElementById('stageName').value = 'autolyse';
          document.getElementById('targetDuration').value = '';
          document.getElementById('tempTarget').value = '';
          document.getElementById('humidityTarget').value = '';
          document.getElementById('stageNotes').value = '';
          // Reload batch details
          loadBatchDetails(currentBatchId);
        } else {
          const data = await response.json();
          showAlert(data.error || 'Failed to start stage', 'error');
        }
      } catch (error) {
        console.error('Error starting stage:', error);
        showAlert('Error starting stage', 'error');
      }
    }

    async function completeStage(stageId) {
      try {
        const response = await fetch(`${API_BASE}/batches/${currentBatchId}/fermentation-stages/${stageId}/complete`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.ok) {
          showAlert('Stage completed!', 'success');
          loadBatchDetails(currentBatchId);
        } else {
          showAlert('Failed to complete stage', 'error');
        }
      } catch (error) {
        console.error('Error completing stage:', error);
        showAlert('Error completing stage', 'error');
      }
    }

    function closeBatchDetails() {
      document.getElementById('batchDetailsModal').style.display = 'none';
      currentBatchId = null;
    }

    // Tab functions
    function showTab(tabName) {
      // Remove active class from all tabs and content
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

      // Add active class to selected tab and content
      event.target.classList.add('active');
      document.getElementById(tabName + 'Tab').classList.add('active');
    }

    // Utility functions
    function showAlert(message, type = 'success') {
      const container = document.getElementById('alertsContainer');
      const alertDiv = document.createElement('div');
      alertDiv.className = `alert alert-${type}`;
      alertDiv.textContent = message;

      container.appendChild(alertDiv);

      // Auto remove after 5 seconds
      setTimeout(() => {
        if (alertDiv.parentNode) {
          alertDiv.parentNode.removeChild(alertDiv);
        }
      }, 5000);
    }

    // Close modals when clicking outside
    window.addEventListener('click', (event) => {
      const modals = ['batchModal', 'batchDetailsModal'];
      modals.forEach(modalId => {
        const modal = document.getElementById(modalId);
        if (event.target === modal) {
          modal.style.display = 'none';
        }
      });
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (event) => {
      // Escape key closes modals
      if (event.key === 'Escape') {
        document.querySelectorAll('.modal').forEach(modal => {
          modal.style.display = 'none';
        });
      }
      
      // Ctrl+N for new batch
      if (event.ctrlKey && event.key === 'n') {
        event.preventDefault();
        showCreateBatch();
      }
    });
  </script>
</body>
</html>
